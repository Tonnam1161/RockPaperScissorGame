<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors - 3D Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; overflow: hidden; }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        #three-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #main-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .menu-title { font-size: 64px; color: #fff; margin-bottom: 20px; }
        .menu-subtitle { font-size: 24px; color: #e94560; margin-bottom: 50px; }
        .menu-buttons { display: flex; gap: 30px; }
        .menu-btn { padding: 20px 50px; font-size: 24px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
        .btn-friend { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-random { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        #chat-container { position: absolute; bottom: 20px; left: 20px; width: 350px; height: 400px; background: rgba(0,0,0,0.7); border-radius: 15px; z-index: 50; display: none; flex-direction: column; border: 2px solid #e94560; }
        #chat-container.visible { display: flex; }
        .chat-header { padding: 15px; background: #e94560; border-radius: 13px 13px 0 0; color: white; font-weight: bold; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; color: white; }
        .chat-message { margin-bottom: 10px; padding: 8px; background: rgba(255,255,255,0.1); border-radius: 8px; }
        .chat-message.self { background: rgba(233,69,96,0.3); margin-left: 20px; }
        .chat-message.opponent { background: rgba(102,126,234,0.3); }
        .chat-input-container { display: flex; padding: 15px; }
        #chat-input { flex: 1; padding: 10px; border: none; border-radius: 25px; background: rgba(255,255,255,0.1); color: white; }
        #chat-send { margin-left: 10px; padding: 10px 25px; border: none; border-radius: 25px; background: #e94560; color: white; cursor: pointer; }
        #timer-display { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); font-size: 48px; color: #fff; z-index: 50; display: none; }
        #timer-display.visible { display: block; }
        #timer-display.warning { color: #ff4757; }
        #result-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 200; flex-direction: column; }
        #result-overlay.visible { display: flex; }
        .result-text { font-size: 72px; color: #fff; margin-bottom: 30px; }
        .play-again-btn { padding: 20px 50px; font-size: 24px; border: none; border-radius: 50px; background: #667eea; color: white; cursor: pointer; }
        #score-display { position: absolute; top: 30px; right: 30px; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 15px; z-index: 50; display: none; color: white; }
        #score-display.visible { display: block; }
        #waiting-room { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 150; flex-direction: column; }
        #waiting-room.visible { display: flex; }
        .spinner { width: 60px; height: 60px; border: 5px solid rgba(255,255,255,0.3); border-top: 5px solid #e94560; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .cancel-btn { margin-top: 30px; padding: 15px 40px; border: none; border-radius: 30px; background: #ff4757; color: white; cursor: pointer; }
        #opponent-info { position: absolute; top: 30px; left: 30px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 15px; z-index: 50; display: none; color: white; }
        #opponent-info.visible { display: block; }
        #choice-buttons { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); display: none; gap: 30px; z-index: 50; }
        #choice-buttons.visible { display: flex; }
        .choice-btn { width: 100px; height: 100px; border-radius: 50%; border: none; cursor: pointer; font-size: 18px; font-weight: bold; color: white; }
        .btn-rock { background: #ff9f43; }
        .btn-paper { background: #54a0ff; }
        .btn-scissors { background: #5f27cd; }
        .choice-btn.selected { box-shadow: 0 0 30px white; transform: scale(1.15); }
        .choice-btn.disabled { opacity: 0.5; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="three-canvas"></canvas>
        <div id="main-menu">
            <h1 class="menu-title">Rock Paper Scissors</h1>
            <p class="menu-subtitle">3D Battle Arena</p>
            <div class="menu-buttons">
                <button class="menu-btn btn-friend" onclick="startGame('friend')">Play with Friend</button>
                <button class="menu-btn btn-random" onclick="startGame('random')">Play Random</button>
            </div>
        </div>
        <div id="timer-display">10</div>
        <div id="score-display">
            <h3>SCOREBOARD</h3>
            <p>You: <span id="player-score">0</span></p>
            <p>Opponent: <span id="opponent-score">0</span></p>
            <p>Draws: <span id="draw-count">0</span></p>
        </div>
        <div id="opponent-info"><strong id="opponent-name">Player 2</strong><br>Online</div>
        <div id="choice-buttons">
            <button class="choice-btn btn-rock" onclick="selectChoice('rock')">Rock</button>
            <button class="choice-btn btn-paper" onclick="selectChoice('paper')">Paper</button>
            <button class="choice-btn btn-scissors" onclick="selectChoice('scissors')">Scissors</button>
        </div>
        <div id="chat-container">
            <div class="chat-header">Game Chat</div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input-container">
                <input type="text" id="chat-input" placeholder="Type..." onkeypress="if(event.key==='Enter')sendChatMessage()">
                <button id="chat-send" onclick="sendChatMessage()">Send</button>
            </div>
        </div>
        <div id="result-overlay">
            <div class="result-text" id="result-text">You Win!</div>
            <button class="play-again-btn" onclick="playAgain()">Play Again</button>
        </div>
        <div id="waiting-room">
            <div class="spinner"></div>
            <p style="color:white;margin:20px;" id="waiting-text">Finding opponent...</p>
            <button class="cancel-btn" onclick="cancelMatchmaking()">Cancel</button>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <script>
        const GameState={MENU:'menu',WAITING:'waiting',PLAYING:'playing',ANIMATING:'animating',RESULT:'result'};
        let currentState=GameState.MENU,gameMode=null,playerChoice=null,opponentChoice=null,timer=10,timerInterval=null;
        let scores={player:0,opponent:0,draws:0},opponentName='Opponent';
        const canvas=document.getElementById('three-canvas'),scene=new THREE.Scene();
        const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
        const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
        renderer.setSize(window.innerWidth,window.innerHeight);
        scene.add(new THREE.AmbientLight(0xffffff,0.5));
        const dl=new THREE.DirectionalLight(0xffffff,0.8);dl.position.set(10,10,10);scene.add(dl);
        camera.position.set(0,3,8);camera.lookAt(0,0,0);
        const floor=new THREE.Mesh(new THREE.CylinderGeometry(6,6,0.2,64),new THREE.MeshStandardMaterial({color:0x1a1a2e}));scene.add(floor);
        const ring=new THREE.Mesh(new THREE.TorusGeometry(6,0.3,16,100),new THREE.MeshStandardMaterial({color:0xe94560,emissive:0xe94560}));ring.rotation.x=Math.PI/2;scene.add(ring);
        const playerGroup=new THREE.Group(),opponentGroup=new THREE.Group();scene.add(playerGroup);scene.add(opponentGroup);
        playerGroup.position.set(-2,0,2);opponentGroup.position.set(2,0,-2);opponentGroup.rotation.y=Math.PI;
        let playerHand=null,opponentHand=null;
        function createHandMesh(type){const g=new THREE.Group();if(type==='rock'){const m=new THREE.Mesh(new THREE.SphereGeometry(0.8),new THREE.MeshStandardMaterial({color:0xff9f43}));g.add(m);}else if(type==='paper'){const m=new THREE.Mesh(new THREE.BoxGeometry(1.2,0.1,1.6),new THREE.MeshStandardMaterial({color:0x54a0ff}));g.add(m);}else if(type==='scissors'){const b1=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.1,1.4),new THREE.MeshStandardMaterial({color:0x5f27cd}));b1.rotation.x=Math.PI/8;const b2=b1.clone();b2.rotation.x=-Math.PI/8;b2.position.z=0.3;g.add(b1);g.add(b2);}return g;}
        function createPlaceholderHands(){const geo=new THREE.TorusKnotGeometry(0.6,0.2),mat=new THREE.MeshStandardMaterial({color:0x666666});if(playerHand)playerGroup.remove(playerHand);if(opponentHand)opponentGroup.remove(opponentHand);playerHand=new THREE.Mesh(geo,mat);opponentHand=new THREE.Mesh(geo,mat.clone());playerGroup.add(playerHand);opponentGroup.add(opponentHand);playerHand.position.set(-2,1,0);opponentHand.position.set(2,1,0);}
        function updateHandMesh(group,hand,type){if(hand)group.remove(hand);const nh=createHandMesh(type);group.add(nh);if(group===playerGroup){nh.position.copy(hand?hand.position:new THREE.Vector3(-2,1,0));playerHand=nh;}else{nh.position.copy(hand?hand.position:new THREE.Vector3(2,1,0));opponentHand=nh;}return nh;}
        createPlaceholderHands();
        function animate(){requestAnimationFrame(animate);ring.rotation.z+=0.005;if(currentState===GameState.PLAYING&&!playerChoice){playerHand.rotation.y+=0.02;opponentHand.rotation.y-=0.02;}renderer.render(scene,camera);}animate();
        window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
        function startGame(mode){gameMode=mode;if(mode==='friend'){opponentName='Friend';showWaitingRoom('Waiting for friend...');setTimeout(()=>{hideWaitingRoom();initializeGame();},2000);}else{opponentName='Player_'+Math.floor(Math.random()*1000);showWaitingRoom('Finding opponent...');setTimeout(()=>{hideWaitingRoom();initializeGame();},3000);}}
        function showWaitingRoom(t){document.getElementById('waiting-text').textContent=t;document.getElementById('waiting-room').classList.add('visible');currentState=GameState.WAITING;}
        function hideWaitingRoom(){document.getElementById('waiting-room').classList.remove('visible');}
        function cancelMatchmaking(){hideWaitingRoom();currentState=GameState.MENU;}
        function initializeGame(){playerChoice=null;opponentChoice=null;timer=10;document.getElementById('main-menu').classList.add('hidden');document.getElementById('timer-display').classList.add('visible');document.getElementById('score-display').classList.add('visible');document.getElementById('opponent-info').classList.add('visible');document.getElementById('chat-container').classList.add('visible');document.getElementById('choice-buttons').classList.add('visible');document.getElementById('opponent-name').textContent=opponentName;createPlaceholderHands();document.querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('selected','disabled'));startTimer();currentState=GameState.PLAYING;addChatMessage('system','Game started! 10 seconds to choose.');}
        function startTimer(){clearInterval(timerInterval);timer=10;updateTimerDisplay();timerInterval=setInterval(()=>{timer--;updateTimerDisplay();if(timer<=3)document.getElementById('timer-display').classList.add('warning');if(timer<=0){clearInterval(timerInterval);if(!playerChoice){playerChoice=['rock','paper','scissors'][Math.floor(Math.random()*3)];addChatMessage('system','Time out! Random selected.');}executeRound();}},1000);}
        function updateTimerDisplay(){document.getElementById('timer-display').textContent=timer;}
        function selectChoice(choice){if(currentState!==GameState.PLAYING||playerChoice)return;playerChoice=choice;document.querySelectorAll('.choice-btn').forEach(b=>{b.classList.remove('selected');if(b.textContent.toLowerCase()===choice)b.classList.add('selected');b.classList.add('disabled');});addChatMessage('self','I chose!');setTimeout(()=>{if(!opponentChoice){opponentChoice=['rock','paper','scissors'][Math.floor(Math.random()*3)];if(playerChoice)executeRound();}},Math.random()*5000+2000);}
        function executeRound(){if(currentState!==GameState.PLAYING)return;clearInterval(timerInterval);currentState=GameState.ANIMATING;document.querySelectorAll('.choice-btn').forEach(b=>b.classList.add('disabled'));gsap.to(playerGroup.position,{y:1.5,duration:0.33,yoyo:true,repeat:2});gsap.to(opponentGroup.position,{y:1.5,duration:0.33,yoyo:true,repeat:2});setTimeout(()=>{const ph=updateHandMesh(playerGroup,playerHand,playerChoice),oh=updateHandMesh(opponentGroup,opponentHand,opponentChoice);gsap.from(ph.scale,{x:0,y:0,z:0,duration:0.5});gsap.from(oh.scale,{x:0,y:0,z:0,duration:0.5,delay:0.2});setTimeout(determineWinner,1500);},2000);}
        function determineWinner(){let result='',wc=0x2ed573;if(playerChoice===opponentChoice){result="It's a Draw!";scores.draws++;wc=0xffa502;}else if((playerChoice==='rock'&&opponentChoice==='scissors')||(playerChoice==='paper'&&opponentChoice==='rock')||(playerChoice==='scissors'&&opponentChoice==='paper')){result='You Win!';scores.player++;}else{result='You Lose!';scores.opponent++;wc=0xff4757;}document.getElementById('player-score').textContent=scores.player;document.getElementById('opponent-score').textContent=scores.opponent;document.getElementById('draw-count').textContent=scores.draws;document.getElementById('result-text').textContent=result;document.getElementById('result-text').style.color='#'+wc.toString(16).padStart(6,'0');document.getElementById('result-overlay').classList.add('visible');addChatMessage('system',result);currentState=GameState.RESULT;}
        function playAgain(){document.getElementById('result-overlay').classList.remove('visible');document.getElementById('timer-display').classList.remove('warning');initializeGame();}
        function addChatMessage(sender,msg){const c=document.getElementById('chat-messages'),d=document.createElement('div');d.className='chat-message';if(sender==='self'){d.classList.add('self');d.innerHTML='<strong>You:</strong>'+msg;}else if(sender==='opponent'){d.classList.add('opponent');d.innerHTML='<strong>'+opponentName+':</strong>'+msg;}else{d.style.background='rgba(233,69,96,0.2)';d.textContent=msg;}c.appendChild(d);c.scrollTop=c.scrollHeight;}
        function sendChatMessage(){const i=document.getElementById('chat-input'),m=i.value.trim();if(m&&currentState!==GameState.MENU){addChatMessage('self',m);i.value='';if(gameMode==='random'&&Math.random()>0.5){setTimeout(()=>addChatMessage('opponent',['Nice!','Good game!','Lets go!'][Math.floor(Math.random()*3)]),Math.random()*3000+1000);}}
    </script>
</body>
</html>
